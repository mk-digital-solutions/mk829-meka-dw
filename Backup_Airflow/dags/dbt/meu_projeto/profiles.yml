# profiles.yml
meu_perfil_postgres:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', 'postgres') }}"
      user: "{{ env_var('DBT_USER', 'airflow') }}"
      pass: "{{ env_var('DBT_PASSWORD', 'airflow') }}"
      dbname: "{{ env_var('DBT_DBNAME', 'airflow') }}"
      schema: public
      port: 5432
      threads: 1