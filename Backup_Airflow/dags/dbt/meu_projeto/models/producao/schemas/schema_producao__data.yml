
models:
  # =========================================================
  # 1. STAGING (Extração e Limpeza)
  # =========================================================
  - name: stg_producao_data
    description: "Modelo incremental que puxa somente novos dados do das hypertables params e variables"
    config:
      schema: dbt_producao
    columns:
      - name: data_hora
        description: "Timestamp da leitura do sensor."
      - name: tag_name
        description: "Nome do tag do equipamento (ex: Tensão, Corrente, WQI)."
      - name: tag_value
        description: "Valor lido no momento."