version: 2

models:
  - name: int_producao__estoque_naoh_pivot
    description: >
      Leituras brutas de nível dos tanques de NaOH/Soda
      (tags LIKE 'LI0000%\U'). Uma linha por (timestamp, sensor).
    config:
      schema: dbt_producao
    columns:
      - name: dt
        description: Timestamp do registro.
      - name: sensor
        description: Identificador do sensor (tag_name).
      - name: nivel_bruto
        description: Leitura bruta de nível do tanque.

  - name: int_producao__estoque_naoh_calc
    description: >
      Agrega o nível total de NaOH por timestamp: filtra valores fora de
      [-900, 130000] e aplica fator de capacidade de 95%.
    config:
      schema: dbt_producao
    columns:
      - name: dt
        description: Timestamp do registro.
      - name: nivel_total
        description: Nível total de NaOH (soma × 0,95).

  - name: producao__estoque_naoh
    description: >
      Série temporal do nível total de NaOH, filtrada pela time_window.
    config:
      schema: dbt_producao
    columns:
      - name: dt
        description: Timestamp do registro.
      - name: nivel_total
        description: Nível total de NaOH (fator 95%).
