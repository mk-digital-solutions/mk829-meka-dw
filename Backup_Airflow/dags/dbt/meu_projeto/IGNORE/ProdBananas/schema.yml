version: 2

# ==============================================================================
# 1. ORIGEM DOS DADOS (Sources)
# ==============================================================================
sources:
  - name: erp_fazenda
    description: "Banco de dados oficial do ERP da fazenda."
    meta:
      owner: "equipe_engenharia@fazenda.com.br"
      tier: "Tier.Tier1"
    tags:
      - "fonte_primaria"
      - "erp"
    tables:
      - name: raw_vendas_banana
        description: "Tabela bruta de vendas de bananas. Contém todos os registros intocados."
        columns:
          - name: pedido_id
            description: "Chave primária do pedido gerada pelo ERP."
            tests:
              - unique
              - not_null
          - name: data_pedido
            description: "Data em que a transação ocorreu no sistema."

# ==============================================================================
# 2. DOCUMENTAÇÃO DOS MODELOS (O fluxo ETL)
# ==============================================================================
models:
  - name: stg_vendas__pedidos
    description: "Camada Bronze: Leitura bruta com padronização de nomes e tipos de dados."
    meta:
      owner: "joao.silva@fazenda.com.br"
      layer: "bronze"
    tags:
      - "staging"
      - "vendas"
    columns:
      - name: pedido_id
        description: "Identificador único do pedido."
        tests:
          - unique
          - not_null
      - name: cliente_id
        description: "Identificador do cliente que comprou no atacado."
        tags:
          - "PII"

  - name: int_vendas__enriquecidas
    description: "Camada Prata: Adição de regras de negócio, como preço por KG e categorização."
    meta:
      owner: "maria.souza@fazenda.com.br"
      layer: "silver"
    tags:
      - "intermediario"
      - "transformacao"
    columns:
      - name: pedido_id
        description: "Chave primária do pedido."
        tests:
          - unique
          - not_null
      - name: preco_medio_kg
        description: "Valor unitário do KG nesta venda específica."
      - name: tipo_banana # <-- AQUI ESTAVA O ERRO! Ajustado para o nome real do SQL
        description: "Classificação da banana vendida baseada no cadastro do produto."
        tests:
          - accepted_values:
              values: ['Nanica', 'Prata', 'da Terra', 'Maçã', 'Ouro']
          - not_null

  - name: fct_vendas_diarias
    description: "Camada Ouro: Tabela Fato limpa, pronta para consumo pelo Metabase/Power BI."
    meta:
      owner: "equipe_bi@fazenda.com.br"
      layer: "gold"
      use_case: "Dashboard Financeiro da Diretoria"
    tags:
      - "fato"
      - "financeiro"
    columns:
      - name: pedido_id
        description: "Chave primária para evitar duplicações no incremental."
        tests:
          - unique
          - not_null
      - name: data_referencia
        description: "Data consolidada do fechamento das vendas."
        tests:
          - not_null
      - name: valor_total
        description: "Receita gerada no pedido em Reais (R$)."
      - name: quantidade_kg
        description: "Peso de bananas vendidas no pedido."